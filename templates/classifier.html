        <div style="height: 300px">
            <!-- just to make scrolling effect possible -->
            <div class = "image_input">
                <h2 class="myH2">Choose your image: </h2>
                <form action = "/upload" method = "post" enctype="multipart/form-data">
                    <!-- <label for="imageInput">Upload an image:</label> -->
                    <input type="file" id="imageInput" name="image" onchange="displayImage()">
                    <br><br>
                    <div id="imageContainer" style="display: none">
                      <img id="preview" src="#" alt="Preview Image">
                      <br><br>
                      <p class = "myP">Is this the image you want to submit?</p>
                      <input type="submit" class = "button-24" value = "Submit">
                    </div>
                  </form>
                  <script>
                    function displayImage() {
                      var reader = new FileReader();
                      reader.onload = function (e) {
                        document.getElementById("preview").src = e.target.result;
                        document.getElementById("imageContainer").style.display = "block";
                      }
                      reader.readAsDataURL(document.getElementById("imageInput").files[0]);
                    }
                  </script>
                  
            </div>
